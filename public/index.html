<!DOCTYPE html>
<html>
<head>

<title>LTFC AI Assistant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="navbar">

<div class="logo">LTFC</div>

<div class="navlinks">

<a href="#">Home</a>
<a href="#">Feed</a>
<a href="#">News</a>
<a href="#">Matches</a>
<a href="#">Players</a>

</div>

</div>

<div class="nav-strip"></div>


<div class="chat-container">

<div class="chat-header">

<div class="bot-icon">⚽</div>

<div>

<h3>LTFC AI Assistant</h3>
<p>Ask anything about Luton Town</p>

</div>

</div>


<div class="welcome" id="welcome">

<h2>How can I help you today?</h2>

<div class="suggestions">

<button onclick="askExample('Next match')">Next Match</button>
<button onclick="askExample('Team players')">Players</button>
<button onclick="askExample('Latest news')">Latest News</button>
<button onclick="askExample('Fan discussions')">Fan Topics</button>

</div>

</div>


<div id="chatbox"></div>


<div class="chat-input">

<input
id="userInput"
type="text"
placeholder="Ask about matches, players..."
>

<button onclick="sendMessage()">➤</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
